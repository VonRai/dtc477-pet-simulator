                        <g id="SVGRepo_iconCarrier">
                            <path d="M8 1H6L2 5H0V11H2L6 15H8V1Z" fill="#ffffff"></path>
                            <path d="M9.29289 6.20711L11.0858 8L9.29289 9.79289L10.7071 11.2071L12.5 9.41421L14.2929 11.2071L15.7071 9.79289L13.9142 8L15.7071 6.20711L14.2929 4.79289L12.5 6.58579L10.7071 4.79289L9.29289 6.20711Z" fill="#ffffff"></path>
                        </g>
                    </svg>
                </span>
                <span id="quit" onclick="closeGame()">
                    <svg width="20px" height="20px" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" fill="#ffffff">
                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                        <g id="SVGRepo_iconCarrier">
                            <path fill="#ffffff" d="M195.2 195.2a64 64 0 0 1 90.496 0L512 421.504 738.304 195.2a64 64 0 0 1 90.496 90.496L602.496 512 828.8 738.304a64 64 0 0 1-90.496 90.496L512 602.496 285.696 828.8a64 64 0 0 1-90.496-90.496L421.504 512 195.2 285.696a64 64 0 0 1 0-90.496z"></path>
                        </g>
                    </svg>
                </span>
            </div>
        </div>
        <div id="title">
            <h1>NIGHT ENCOUNTER</h1>
            <h2>WILL THEY CRAWL INTO YOUR HEART?</h2>
            <button id="startbtn" onclick="playClickSound()">START</button>
            <button id="creditsbtn" onclick="playClickSound()">CREDITS</button>
        </div>
        <div id="credits">

                    <g id="SVGRepo_iconCarrier">
                        <title></title>

                    </g>
                </svg>
            </span>
            <h3>CREATORS</h3>
            <span class="creator">
                <h4>VON MILLER</h4>
                <p>VISUAL NOVEL, FOOD STAGE, AUDIO, CSS & UI</p>
            </span>
            <span class="creator">
                <h4>TIFFANY SHIN</h4>
            </span>
            <span class="creator">
                <h4>JAMIE MOULTON</h4>
            </span>
            <h3>AUDIO</h3>
            <span class="creator">
                <h4><a href="https://pixabay.com/users/retro-bgm-chan-55246343/" target="_blank">RETRO-BGM-CHAN | PIXABAY</a></h4>
                <p>INTRO MUSIC: Convenience Store_こんびに</p>
                <p>MAIN MUSIC: Stupid Enemy_まぬけけなてき</p>
            </span>
        </div>
        <!-- VISUAL NOVEL -->
        <div id="dialogue">
            <h3 id="name"></h3>
            <p id="textbox"></p>
            <button id="nextbtn" onclick="playClickSound()">NEXT</button>
        </div>
        <!-- CANVAS LAYER -->
        <div id="canvasBox">
            <canvas id="canvas" width="600" height="450"></canvas>
        </div>

    <!-- STAGE 1 / FOOD -->


    <!-- STAGE 2 / SOCCER -->
    <canvas width="600" height="450" id="pongCanvas"></canvas>

    <!-- STAGE 3 / HIDE & SEEK -->




    <!-- FOR LINKING TO CANVAS DISPLAY -->
    <img id="couch" class="hide" src="img/cushion-open.png">
    <img id="lamp" class="hide" src="img/lamp-open.png'">
    <img id="drawer" class="hide" src="img/drawer-open.png">
    <img id="safe" class="hide" src="img/painting-open.png">
    <img id="carpet" class="hide" src="img/carpet-open.png">
    <img id="living-room" class="hide" src="img/hide-bg.png">
    <img id="drawer-layer" class="hide" src="img/drawer-layer.png">

    <script src="js/stage-food.js"></script>
    <script src="js/stage-bath.js"></script>
    <script src="js/stage-hide.js"></script>
    <script src="js/stage-soccer.js"></script>
    <script src="js/visual-novel.js"></script>

    <!-- UI LOGIC-->
    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext('2d');

        function openGame() {
            document.getElementById("gameBox").style.display = "flex";

            playMusic();
        }

        function closeGame() {
            document.getElementById("gameBox").style.display = "none";

            introMusic.pause();
            introMusic.currentTime = 0;
        }

        document.getElementById("creditsbtn").addEventListener("click", function () {
            document.getElementById("title").style.display = "none";
            document.getElementById("dialogue").style.display = "none";
            document.getElementById("credits").style.display = "flex";
        });

        document.getElementById("backBtn").addEventListener("click", function () {
            document.getElementById("title").style.display = "flex";
            document.getElementById("credits").style.display = "none";
        });


        // Make the DIV element draggable:
        dragElement(document.getElementById("gameBox"));

        function dragElement(element) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            if (document.getElementById("dragBar")) {
                // if present, the header is where you move the DIV from:
                document.getElementById("dragBar").onmousedown = dragMouseDown;
            } else {
                // otherwise, move the DIV from anywhere inside the DIV:
                element.onmousedown = dragMouseDown;
            }

            function dragMouseDown(e) {
                e = e || window.event;
                e.preventDefault();
                // get the mouse cursor position at startup:
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                // call a function whenever the cursor moves:
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                // calculate the new cursor position:
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                // set the element's new position:
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                // stop moving when mouse button is released:
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        //AUDIO

        const clickSound = new Audio("audio/click.mp3");
        const introMusic = new Audio("audio/intro-music.mp3");
        const mainMusic = new Audio("audio/main-music.mp3");

        clickSound.volume = 0.5;
        introMusic.volume = 0.1;
        introMusic.loop = true; // keeps music looping
        mainMusic.volume = 0.1;
        mainMusic.loop = true;

        let currentMusic = introMusic

        document.getElementById("startbtn").addEventListener("click", function () {
            currentMusic.pause();
            currentMusic = mainMusic;
            playMusic();
        });

        function playClickSound() {
            clickSound.currentTime = 0;
            clickSound.play();
        }

        function playMusic() {
            document.getElementById("volumePlay").style.display = "none";
            document.getElementById("volumeMute").style.display = "flex";

            currentMusic.play();
        }

        function muteAudio() {
            document.getElementById("volumeMute").style.display = "none";
            document.getElementById("volumePlay").style.display = "flex";

            currentMusic.pause();
        }

    </script>

</body>

</html>
